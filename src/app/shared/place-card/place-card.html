<mat-card
  class="card"
  appearance="outlined"
  role="link"
  tabindex="0"
  [attr.aria-label]="'View details for ' + place().name"
  (click)="open()"
  (keydown.enter)="open()"
>
  <img mat-card-image [src]="place().thumbnailUrl" [alt]="place().name" loading="lazy" />
  <button
    mat-icon-button
    class="fav"
    [attr.aria-label]="saved() ? 'Remove from wishlist' : 'Add to wishlist'"
    (click)="toggle($event)"
  >
    <mat-icon>{{ saved() ? 'favorite' : 'favorite_border' }}</mat-icon>
  </button>
  <mat-card-content>
    <h3 class="name">{{ place().name }}</h3>
    <p class="category">
      <mat-icon inline>place</mat-icon>
      {{ place().category }}
    </p>
    @if (place().address) {
      <p class="address">{{ place().address }}</p>
    }
  </mat-card-content>
</mat-card>
